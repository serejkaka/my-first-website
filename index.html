<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GadgetWorld Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <span class="logo">GadgetWorld</span>
            <div class="nav-links">
                <a href="#">Смартфоны</a>
                <a href="#">Планшеты</a>
            </div>
        </div>
    </nav>

    <main class="hero">
        <div class="hero-content">
            <span class="tagline">Презентация нового поколения</span>
            <h1>Улучшая совершенство.</h1>
            <p>Премиальный дизайн. Невероятная мощь. Мы создаем будущее, которое можно потрогать.</p>
            <div class="cta-buttons">
                <button class="btn-primary">Заказать</button>
            </div>
        </div>

        <div class="product-box">
            <div class="mock-phone">
                <div class="phone-screen">Gadget Pro</div>
            </div>
        </div>
    </main>

</body>
</html>
