<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore — Магазин оригинальной техники</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-light);
            padding-bottom: 60px;
        }

        /* Шапка сайта */
        header {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 800;
            font-size: 1.3rem;
            letter-spacing: 0.5px;
        }

        .logo span {
            color: var(--accent);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-lang {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-light);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .btn-cart-trigger {
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 1.3rem;
            position: relative;
            cursor: pointer;
            padding: 4px;
        }

        .cart-badge {
            position: absolute;
            top: -4px;
            right: -6px;
            background-color: var(--accent);
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: bold;
        }

        .btn-sign {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Баннер */
        .promo-banner {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .banner-card {
            background: linear-gradient(135deg, #1d4ed8 0%, #0f172a 100%);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .banner-card h1 {
            font-size: 1.7rem;
            margin-bottom: 8px;
        }

        .banner-card p {
            color: #cbd5e1;
            font-size: 0.95rem;
        }

        /* Каталог товаров */
        .catalog-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 15px;
        }

        .section-title {
            font-size: 1.3rem;
            margin: 25px 0 15px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .product-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-img {
            width: 100%;
            height: 180px;
            background-color: #334155;
            border-radius: 8px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .product-title {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .product-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        .product-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-light);
        }

        .btn-add {
            background-color: #334155;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .btn-add:hover {
            background-color: var(--accent);
        }

        /* Выпадающее окно корзины */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 400px;
            height: 100%;
            background-color: var(--bg-card);
            border-left: 1px solid var(--border);
            z-index: 200;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
        }

        .cart-sidebar.open {
            right: 0;
        }

        .cart-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.6rem;
            cursor: pointer;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            background-color: var(--bg-main);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .cart-item-details h4 {
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .cart-item-details p {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .btn-remove {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .cart-footer {
            padding: 20px;
            border-top: 1px solid var(--border);
            background-color: #172554;
        }

        .total-price-box {
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .btn-checkout {
            width: 100%;
            background-color: var(--success);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Модалка SIGN IN */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            padding: 15px;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 12px;
            width: 100%;
            max-width: 360px;
            position: relative;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            background-color: var(--bg-main);
            border: 1px solid var(--border);
            color: white;
            padding: 10px;
            border-radius: 6px;
            outline: none;
        }
    </style>
</head>
<body>

    <!-- Навигация -->
    <header>
        <div class="logo">⚡ Tech<span>Store</span></div>
        <div class="header-actions">
            <button class="btn-lang" id="langBtn" onclick="toggleLanguage()">EN</button>
            <button class="btn-cart-trigger" onclick="toggleCart(true)">
                🛒 <span class="cart-badge" id="cartCount">0</span>
            </button>
            <button class="btn-sign" id="signBtn" onclick="toggleModal(true)">Sign In</button>
        </div>
    </header>

    <!-- Баннер -->
    <section class="promo-banner">
        <div class="banner-card">
            <h1 id="bannerTitle">⚡ Флагманская техника 2026</h1>
            <p id="bannerDesc">Только оригинальные девайсы от Apple, Logitech и Dyson с официальной гарантией.</p>
        </div>
    </section>

    <!-- Каталог -->
    <main class="catalog-container">
        <h2 class="section-title" id="catalogTitle">🔥 Популярные товары</h2>
        <div class="products-grid" id="productsGrid">
            <!-- Сюда скрипт вставит карточки -->
        </div>
    </main>

    <!-- Боковая корзина -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3 id="cartTitle">Ваша корзина</h3>
            <button class="btn-close" onclick="toggleCart(false)">&times;</button>
        </div>
        <div class="cart-items" id="cartItemsList">
            <!-- Элементы корзины -->
        </div>
        <div class="cart-footer">
            <div class="total-price-box">
                <span id="totalLabel">Итого:</span>
                <span id="totalPriceDisplay">$0</span>
            </div>
            <button class="btn-checkout" id="btnCheckout" onclick="checkout()">Оформить заказ</button>
        </div>
    </div>

    <!-- Модалка логина -->
    <div class="modal-overlay" id="loginModal" onclick="closeModalOutside(event)">
        <div class="modal-content">
            <button class="btn-close" style="position: absolute; top: 15px; right: 15px;" onclick="toggleModal(false)">&times;</button>
            <h3 id="modalHeader" style="margin-bottom: 20px;">Вход в аккаунт</h3>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label id="lblPass">Пароль</label>
                <input type="password" placeholder="••••••••">
            </div>
            <button class="btn-sign" id="btnSubmitModal" style="width: 100%; padding: 12px; margin-top: 10px;" onclick="handleLogin()">Войти</button>
        </div>
    </div>

    <script>
        // Данные товаров
        const products = [
            { id: 1, name: "Apple iPhone 15 Pro", category: "apple", price: 999, emoji: "📱", desc: "Titanium body, A17 Pro chip.", descRu: "Титановый корпус, чип A17 Pro, идеальная камера." },
            { id: 2, name: "Logitech MX Master 3S", category: "logitech", price: 109, emoji: "🖱️", desc: "Ergonomic wireless mouse, silent clicks.", descRu: "Эргономичная беспроводная мышь, тихий клик." },
            { id: 3, name: "Dyson Airwrap Multistyler", category: "dyson", price: 599, emoji: "💇", desc: "Special edition multi-styler for hair.", descRu: "Мультистайлер для бережного ухода и укладки волос." },
            { id: 4, name: "Apple MacBook Pro 14\"", category: "apple", price: 1599, emoji: "💻", desc: "Liquid Retina XDR display, M3 chip.", descRu: "Дисплей Liquid Retina XDR, мощный процессор M3." }
        ];

        // Локализация
        const langData = {
            RU: {
                langBtn: "EN", signBtn: "Войти", bannerTitle: "⚡ Флагманская техника 2026",
                bannerDesc: "Только оригинальные девайсы от Apple, Logitech и Dyson с официальной гарантией.",
                catalogTitle: "🔥 Популярные товары", cartTitle: "Ваша корзина", totalLabel: "Итого:",
                btnCheckout: "Оформить заказ", modalHeader: "Вход в аккаунт", lblPass: "Пароль",
                btnSubmitModal: "Войти", addBtn: "В корзину", removeBtn: "Удалить"
            },
            EN: {
                langBtn: "RU", signBtn: "Sign In", bannerTitle: "⚡ Flagship Tech 2026",
                bannerDesc: "Only original devices from Apple, Logitech, and Dyson with official warranty.",
                catalogTitle: "🔥 Popular Products", cartTitle: "Your Cart", totalLabel: "Total:",
                btnCheckout: "Checkout", modalHeader: "Account Login", lblPass: "Password",
                btnSubmitModal: "Login", addBtn: "To Cart", removeBtn: "Remove"
            }
        };

        let currentLang = 'RU';
        let cart = [];

        // Рендер каталога
        function renderCatalog() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            
            products.forEach(p => {
                const descText = currentLang === 'RU' ? p.descRu : p.desc;
                const btnText = langData[currentLang].addBtn;
                
                grid.innerHTML += `
                    <div class="product-card">
                        <div>
                            <div class="product-img">${p.emoji}</div>
                            <div class="product-title">${p.name}</div>
                            <div class="product-desc">${descText}</div>
                        </div>
                        <div class="product-footer">
                            <div class="product-price">$${p.price}</div>
                            <button class="btn-add" onclick="addToCart(${p.id})">${btnText}</button>
                        </div>
                    </div>
                `;
            });
        }

        // Переключение языка
        function toggleLanguage() {
            currentLang = currentLang === 'RU' ? 'EN' : 'RU';
            const data = langData[currentLang];

            document.getElementById('langBtn').innerText = data.langBtn;
            document.getElementById('signBtn').innerText = data.signBtn;
            document.getElementById('bannerTitle').innerText = data.bannerTitle;
            document.getElementById('bannerDesc').innerText = data.bannerDesc;
            document.getElementById('catalogTitle').innerText = data.catalogTitle;
            document.getElementById('cartTitle').innerText = data.cartTitle;
            document.getElementById('totalLabel').innerText = data.totalLabel;
            document.getElementById('btnCheckout').innerText = data.btnCheckout;
            document.getElementById('modalHeader').innerText = data.modalHeader;
            document.getElementById('lblPass').innerText = data.lblPass;
            document.getElementById('btnSubmitModal').innerText = data.btnSubmitModal;

            renderCatalog();
            renderCart();
        }

        // Логика корзины
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const exists = cart.find(item => item.id === id);
            
            if (exists) {
                exists.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            renderCart();
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            renderCart();
        }

        function renderCart() {
            const cartList = document.getElementById('cartItemsList');
            const cartCount = document.getElementById('cartCount');
            const totalPriceDisplay = document.getElementById('totalPriceDisplay');
            
            cartList.innerHTML = '';
            let total = 0;
            let count = 0;

            cart.forEach(item => {
                total += item.price * item.quantity;
                count += item.quantity;
                const rmText = langData[currentLang].removeBtn;

                cartList.innerHTML += `
                    <div class="cart-item">
                        <div class="cart-item-details">
                            <h4>${item.name}</h4>
                            <p>$${item.price} x ${item.quantity}</p>
                        </div>
                        <button class="btn-remove" onclick="removeFromCart(${item.id})">${rmText}</button>
                    </div>
                `;
            });

            cartCount.innerText = count;
            totalPriceDisplay.innerText = `$${total}`;
        }

        function toggleCart(show) {
            const sidebar = document.getElementById('cartSidebar');
            if (show) sidebar.classList.add('open');
            else sidebar.classList.remove('open');
        }

        function checkout() {
            if (cart.length === 0) {
                alert(currentLang === 'RU' ? "Корзина пуста!" : "Cart is empty!");
                return;
            }
            alert(currentLang === 'RU' ? "Заказ успешно оформлен!" : "Order placed successfully!");
            cart = [];
            renderCart();
            toggleCart(false);
        }

        // Модалка входа
        function toggleModal(show) {
            const modal = document.getElementById('loginModal');
            if (show) modal.classList.add('open');
            else modal.classList.remove('open');
        }

        function closeModalOutside(e) {
            if (e.target.id === 'loginModal') toggleModal(false);
        }

        function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            if (!email) {
                alert(currentLang === 'RU' ? "Введите email!" : "Enter email!");
                return;
            }
            alert(currentLang === 'RU' ? `Приветствуем, ${email}!` : `Welcome, ${email}!`);
            toggleModal(false);
        }

        // Старт страницы
        renderCatalog();
    </script>
</body>
</html>
